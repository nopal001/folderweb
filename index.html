<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>For Callysta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --rose: #e8a0a8;
  --cream: #fdf6f0;
  --deep: #2c1a1d;
  --mid: #6b3d44;
  --accent: #c4687a;
}

html, body {
  width: 100%;
  height: 100%;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'DM Sans', sans-serif;
}

/* ── PHONE: 9:16, fit ke layar ── */
.phone {
  width: min(100vw, calc(100vh * 9 / 16));
  height: min(100vh, calc(100vw * 16 / 9));
  max-width: 430px;
  max-height: calc(430px * 16 / 9);
  position: relative;
  overflow: hidden;
  background: var(--cream);
  flex-shrink: 0;
}

/* ── BG: warm peachy — santai, cocok buat temen ── */
.bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 110% 55% at 50% -5%, #ffe4cc 0%, transparent 52%),
    radial-gradient(ellipse 70% 50% at 95% 90%, #ffd0dc 0%, transparent 50%),
    radial-gradient(ellipse 55% 40% at 5% 65%, #fff0e0 0%, transparent 48%),
    #fdf6f0;
}
.bg::after {
  content:'';
  position:absolute;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* blobs dekorasi */
.blob1 {
  position:absolute;
  width:160px; height:160px;
  top:-35px; right:-35px;
  border-radius: 58% 42% 65% 35% / 48% 58% 42% 52%;
  border: 1.5px solid rgba(196,104,122,0.13);
  animation: morph 9s ease-in-out infinite;
}
.blob2 {
  position:absolute;
  width:90px; height:90px;
  bottom:20%; left:-18px;
  border-radius: 42% 58% 32% 68% / 60% 40% 55% 45%;
  border: 1px solid rgba(196,104,122,0.09);
  animation: morph 11s ease-in-out infinite reverse;
}
@keyframes morph {
  0%,100% { border-radius: 58% 42% 65% 35% / 48% 58% 42% 52%; }
  50%      { border-radius: 38% 62% 35% 65% / 62% 38% 68% 32%; }
}

.dot { position:absolute; border-radius:50%; background:var(--rose); opacity:0; animation: popIn 0.4s ease forwards; }
.d1 { width:5px;height:5px; top:13%; left:9%;  animation-delay:2.1s; }
.d2 { width:3px;height:3px; top:19%; left:83%; animation-delay:2.5s; }
.d3 { width:4px;height:4px; top:31%; left:13%; animation-delay:2.9s; }
@keyframes popIn { to { opacity:0.38; } }

/* ── HEADER ── */
.lbl {
  position:absolute;
  top:5%;
  left:0; right:0;
  text-align:center;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(9px,2.4vw,11px);
  letter-spacing:3px;
  color:var(--accent);
  opacity:0;
  animation: fadeUp 1s ease 0.3s forwards;
}
.div-line {
  position:absolute;
  top:calc(5% + 18px);
  left:50%; transform:translateX(-50%);
  width:34px; height:1px;
  background:linear-gradient(to right,transparent,var(--rose),transparent);
  opacity:0;
  animation: fadeUp 1s ease 0.5s forwards;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TEXT ── */
.txt-box {
  position:absolute;
  top:11.5%;
  left:22px; right:22px;
}
.txt-box p {
  font-size:clamp(12px,3.4vw,14.5px);
  line-height:1.88;
  color:var(--deep);
  font-weight:300;
  opacity:0;
  animation: fadeUp 0.8s ease 0.9s forwards;
  min-height:90px;
}
.cursor {
  display:inline-block;
  width:1.5px; height:13px;
  background:var(--accent);
  margin-left:2px;
  vertical-align:middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50%{ opacity:0; } }

/* ── FOTO: contain, ga kepotong ── */
.photo-area {
  position:absolute;
  /* dari bawah text sampai atas button */
  top:44%;
  bottom:13%;
  left:0; right:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  overflow:hidden;
}
.photo-area img {
  max-width:100%;
  max-height:100%;
  width:auto;
  height:100%;
  object-fit:contain;
  object-position:bottom center;
  opacity:0;
  transform:scale(1.05) translateY(6px);
  animation: imgIn 1.2s cubic-bezier(.22,1,.36,1) 0.7s forwards;
}
@keyframes imgIn {
  to { opacity:1; transform:scale(1) translateY(0); }
}

/* gradient bawah nyambung ke button */
.photo-fade {
  position:absolute;
  bottom:13%;
  left:0; right:0;
  height:10%;
  background:linear-gradient(to top, var(--cream) 0%, transparent 100%);
  pointer-events:none;
}

/* ── BUTTON ── */
.btn {
  position:absolute;
  bottom:5%;
  left:50%;
  transform:translate(-50%,14px);
  padding:11px 28px;
  border:1.5px solid var(--accent);
  border-radius:50px;
  background:transparent;
  color:var(--accent);
  font-family:'DM Sans',sans-serif;
  font-size:clamp(11px,2.9vw,13px);
  font-weight:500;
  letter-spacing:0.4px;
  cursor:pointer;
  opacity:0;
  transition:0.45s cubic-bezier(.22,1,.36,1);
  white-space:nowrap;
}
.btn:hover { background:var(--accent); color:white; }
.btn.show  { opacity:1; transform:translate(-50%,0); }

/* ── OVERLAY ── */
.overlay {
  position:absolute; inset:0;
  background:rgba(44,26,29,0.4);
  backdrop-filter:blur(8px) saturate(0.7);
  opacity:0; pointer-events:none;
  transition:0.45s ease;
}
.overlay.show { opacity:1; pointer-events:all; }

/* ── CARD ── */
.card {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.82) translateY(16px);
  width:82%;
  background:var(--cream);
  border-radius:22px;
  padding:26px 20px 20px;
  text-align:center;
  opacity:0;
  transition:0.45s cubic-bezier(.22,1,.36,1);
  box-shadow:0 0 0 1px rgba(200,100,120,0.1), 0 24px 50px rgba(44,26,29,0.22);
}
.card.show { opacity:1; transform:translate(-50%,-50%) scale(1) translateY(0); }
.card-lbl { font-family:'Playfair Display',serif; font-style:italic; font-size:10px; letter-spacing:3px; color:var(--rose); margin-bottom:5px; }
.card h3 { font-family:'Playfair Display',serif; font-size:clamp(17px,5vw,21px); color:var(--deep); font-weight:600; margin-bottom:8px; }
.card-bar { width:28px; height:1px; background:linear-gradient(to right,transparent,var(--rose),transparent); margin:0 auto 12px; }
.card p { font-size:clamp(11.5px,2.9vw,13px); line-height:1.85; color:var(--mid); font-weight:300; min-height:55px; }
.card img { width:100%; border-radius:13px; margin-top:13px; display:block; }
.close-btn {
  position:absolute; top:12px; right:13px;
  width:24px; height:24px; border-radius:50%;
  background:rgba(200,100,120,0.1);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:10px; color:var(--accent);
  transition:background 0.2s;
}
.close-btn:hover { background:rgba(200,100,120,0.22); }

/* ── HEARTS ── */
.hearts { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.heart { position:absolute; font-size:13px; opacity:0; animation:floatH 2.8s ease forwards; }
@keyframes floatH {
  0%   { opacity:0; transform:translateY(0) scale(0.5); }
  20%  { opacity:0.75; }
  100% { opacity:0; transform:translateY(-85px) scale(1.1); }
}
</style>
</head>
<body>

<div class="phone">
  <div class="bg"></div>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="dot d1"></div>
  <div class="dot d2"></div>
  <div class="dot d3"></div>

  <div class="lbl">FOR CALLYSTA</div>
  <div class="div-line"></div>

  <div class="txt-box"><p id="text1"></p></div>

  <div class="photo-area">
    <img src="catme.png" alt="">
  </div>
  <div class="photo-fade"></div>

  <button class="btn" id="btn" onclick="openCard()">Lanjut Klik Disini</button>

  <div class="hearts" id="hearts"></div>
  <div class="overlay" id="overlay" onclick="closeCard()"></div>

  <div class="card" id="card">
    <div class="close-btn" onclick="closeCard()">✕</div>
    <div class="card-lbl">p.s</div>
    <h3>Cally ✨</h3>
    <div class="card-bar"></div>
    <p id="text2"></p>
    <img src="cally.png" alt="">
  </div>
</div>

<script>
const msg1 = `Helloo Callysta 👋\nAku Shofy lohh...\n\nRandom banget ya kita ketemu di Bumpy 😄\nkayak... yaudah ketemu aja gitu\nTapi langsung nyambung aja 😆`;
const msg2 = `Tenang aja, jadi IT itu wajar kalau sering nggak ngerti… aku juga, lagi nggak ngerti kenapa jadi sering merhatiin kamu 😆`;

function typeWriter(el, text, speed, cb) {
  el.innerHTML = "";
  let i = 0;
  (function tick() {
    if (i < text.length) {
      el.innerHTML += text[i] === '\n' ? '<br>' : text[i];
      i++;
      setTimeout(tick, speed || 36);
    } else {
      el.innerHTML += '<span class="cursor"></span>';
      if (cb) cb();
    }
  })();
}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => typeWriter(document.getElementById("text1"), msg1), 900);
  setTimeout(() => document.getElementById("btn").classList.add("show"), 4500);
});

function spawnHearts() {
  const c = document.getElementById("hearts");
  const em = ["🌸","💗","✨","🌷","💕","🍑"];
  for (let i = 0; i < 9; i++) {
    setTimeout(() => {
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = em[Math.floor(Math.random() * em.length)];
      h.style.left = (10 + Math.random() * 80) + "%";
      h.style.bottom = (8 + Math.random() * 18) + "%";
      h.style.animationDelay = (Math.random() * 0.4) + "s";
      c.appendChild(h);
      setTimeout(() => h.remove(), 3200);
    }, i * 130);
  }
}

function openCard() {
  document.getElementById("overlay").classList.add("show");
  document.getElementById("card").classList.add("show");
  spawnHearts();
  setTimeout(() => typeWriter(document.getElementById("text2"), msg2), 400);
}
function closeCard() {
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("card").classList.remove("show");
}
</script>
</body>
</html>
