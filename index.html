<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HBD Nataa! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --rose: #e8a0a8;
  --cream: #fdf6f0;
  --deep: #2c1a1d;
  --mid: #6b3d44;
  --accent: #c4687a;
}
html, body {
  width: 100%;
  height: 100%;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}
.phone {
  width: min(100vw, calc(100vh * 9 / 16));
  height: min(100vh, calc(100vw * 16 / 9));
  max-width: 430px;
  max-height: calc(430px * 16 / 9);
  position: relative;
  overflow: hidden;
  background: var(--cream);
  border-radius: 40px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
.bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 110% 55% at 50% -5%, #ffe4cc 0%, transparent 52%),
              radial-gradient(ellipse 70% 50% at 95% 90%, #ffd0dc 0%, transparent 50%),
              radial-gradient(ellipse 55% 40% at 5% 65%, #fff0e0 0%, transparent 48%),
              #fdf6f0;
}
.bg::after {
  content:'';
  position:absolute;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
}

/* Blob dekorasi */
.blob1, .blob2 {
  position:absolute;
  border-radius:50%;
  animation: morph 9s ease-in-out infinite;
}
.blob1 {
  width:160px; height:160px;
  top:-35px; right:-35px;
  border: 1.5px solid rgba(196,104,122,0.13);
}
.blob2 {
  width:100px; height:100px;
  bottom:18%; left:-20px;
  border: 1px solid rgba(196,104,122,0.09);
  animation-duration:12s;
  animation-direction:reverse;
}
@keyframes morph {
  0%,100% { border-radius: 58% 42% 65% 35% / 48% 58% 42% 52%; }
  50% { border-radius: 38% 62% 35% 65% / 62% 38% 68% 32%; }
}

/* Judul */
.main-title {
  position:absolute;
  top:18%;
  left:0; right:0;
  text-align:center;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(23px, 7.5vw, 29px);
  line-height:1.25;
  color:var(--deep);
  z-index: 2;
}

/* Tombol Lihat Pesan */
.btn-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  text-align: center;
}
.btn {
  background: var(--rose);
  color: white;
  border: none;
  padding: 16px 32px;
  font-size: 17px;
  font-weight: 500;
  border-radius: 50px;
  box-shadow: 0 8px 25px rgba(196, 104, 122, 0.35);
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 12px 30px rgba(196, 104, 122, 0.45);
}
.btn:active {
  transform: scale(0.95);
}

/* Card Pesan */
.card {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.85) translateY(50px);
  width:86%;
  background:var(--cream);
  border-radius:24px;
  padding:35px 26px 32px;
  text-align:center;
  opacity:0;
  visibility: hidden;
  box-shadow:0 0 0 1px rgba(200,100,120,0.15), 0 30px 70px rgba(44,26,29,0.35);
  z-index: 200;
  transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}
.card.show {
  opacity:1;
  visibility: visible;
  transform:translate(-50%,-50%) scale(1) translateY(0);
}
.card-lbl {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:11.5px;
  letter-spacing:3px;
  color:var(--rose);
  margin-bottom:10px;
}
.card h3 {
  font-family:'Playfair Display',serif;
  font-size:clamp(21px, 6vw, 26px);
  color:var(--deep);
  font-weight:600;
  margin-bottom:12px;
}
.card-bar {
  width:36px;
  height:1.5px;
  background:linear-gradient(to right,transparent,var(--rose),transparent);
  margin:0 auto 18px;
}
.card p {
  font-size:clamp(14px, 3.6vw, 15.8px);
  line-height:1.82;
  color:var(--mid);
  font-weight:300;
  text-align:left;
  white-space: pre-line;
  margin-bottom: 20px;
}

/* Foto Nataa - muncul setelah teks selesai */
.nata-photo {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
  border-radius: 16px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
.nata-photo.show {
  opacity: 1;
  transform: translateY(0);
}

/* Hearts */
.hearts {
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index: 150;
}
.heart {
  position:absolute;
  font-size:17px;
  opacity:0;
  animation:floatH 3.5s ease forwards;
}
@keyframes floatH {
  0% { opacity:0; transform:translateY(0) scale(0.5); }
  25% { opacity:0.9; }
  100% { opacity:0; transform:translateY(-160px) scale(1.3); }
}
</style>
</head>
<body>
<div class="phone">
  <div class="bg"></div>
  <div class="blob1"></div>
  <div class="blob2"></div>
  
  <div class="main-title">NATT..AKU DENGER..<br>KAMU ULTAH YA HARI INI....</div>

  <!-- Tombol Awal -->
  <div class="btn-container" id="btnContainer">
    <button class="btn" id="openBtn">Lihat Pesan Spesial</button>
  </div>

  <!-- Card Pesan -->
  <div class="card" id="card">
    <div class="card-lbl">dari Shofy</div>
    <h3>Happy Birthday, Nataa! 🎂</h3>
    <div class="card-bar"></div>
    <p id="text2"></p>
    
    <!-- Foto Nataa (paling bawah) -->
    <img src="nata.jpeg" alt="Nataa" class="nata-photo" id="nataPhoto">
  </div>

  <div class="hearts" id="hearts"></div>
</div>

<script>
const msg2 = `Happy birthday, Nataa!! 🥳 Yang ke... berapa ya? 24 kan? 🤣 wkwkwkwk
Yahh pokoknya semoga tahun ini penuh kebahagiaan, kemudahan, dan semua hal yang kamu harapkan bisa tercapai ya ✨
Aamiin.. barakallah fii umrik 
Semangat terus buat kerjaannya! Aku tahu kadang capek dan berat, tapi kamu pasti bisa lewatin semuanya dengan baik
Ohh yaa lupa istirahat, jaga kesehatan...
– Shofy (from Bmpy)`;

function typeWriter(el, text, speed = 38, callback) {
  el.innerHTML = "";
  let i = 0;
  function tick() {
    if (i < text.length) {
      el.innerHTML += text[i] === '\n' ? '<br>' : text[i];
      i++;
      setTimeout(tick, speed);
    } else if (callback) {
      callback(); // Jalankan callback setelah typing selesai
    }
  }
  tick();
}

function spawnHearts() {
  const c = document.getElementById("hearts");
  const em = ["🎉","🌸","✨","💐","🎂","💖","🌷","❤️","🥳"];
 
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = em[Math.floor(Math.random() * em.length)];
      h.style.left = (10 + Math.random() * 80) + "%";
      h.style.bottom = (15 + Math.random() * 30) + "%";
      h.style.animationDelay = (Math.random() * 1.2) + "s";
      c.appendChild(h);
      setTimeout(() => h.remove(), 4500);
    }, i * 80);
  }
}

// Event klik tombol
document.getElementById("openBtn").addEventListener("click", () => {
  const btnContainer = document.getElementById("btnContainer");
  const card = document.getElementById("card");

  btnContainer.style.transition = "all 0.6s ease";
  btnContainer.style.opacity = "0";
  btnContainer.style.transform = "translate(-50%, -50%) scale(0.8)";

  setTimeout(() => {
    btnContainer.style.display = "none";
    card.classList.add("show");
    
    setTimeout(() => {
      spawnHearts();
      typeWriter(document.getElementById("text2"), msg2, 38, () => {
        // Setelah teks selesai diketik, tampilkan foto
        document.getElementById("nataPhoto").classList.add("show");
      });
    }, 400);
  }, 600);
});
</script>
</body>
</html>
