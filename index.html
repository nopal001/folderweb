<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HBD Nataa! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --rose: #e8a0a8;
  --cream: #fdf6f0;
  --deep: #2c1a1d;
}
html, body {
  width: 100%;
  height: 100%;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  touch-action: manipulation; /* tambahan untuk HP */
}
.phone {
  width: min(100vw, calc(100vh * 9 / 16));
  height: min(100vh, calc(100vw * 16 / 9));
  max-width: 430px;
  max-height: calc(430px * 16 / 9);
  position: relative;
  overflow: hidden;
  background: var(--cream);
  border-radius: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* ringan */
}
.bg {
  position: absolute;
  inset: 0;
  background: #fdf6f0; /* hilangkan gradient berat */
  /* background radial-gradient dihapus sementara */
}

/* Blob - di-simplify */
.blob1, .blob2 {
  position:absolute;
  border-radius:50%;
  border: 1px solid rgba(196,104,122,0.08);
  animation: morph 12s ease-in-out infinite;
  will-change: transform; /* hint ke browser */
}
.blob1 {
  width:140px; height:140px;
  top:-30px; right:-30px;
}
.blob2 {
  width:90px; height:90px;
  bottom:20%; left:-15px;
  animation-duration:16s;
  animation-direction:reverse;
}
@keyframes morph {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* Judul */
.main-title {
  position:absolute;
  top:18%;
  left:0; right:0;
  text-align:center;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(23px, 7.5vw, 29px);
  line-height:1.25;
  color:var(--deep);
  z-index: 2;
}

/* Tombol */
.btn-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
}
.btn {
  background: var(--rose);
  color: white;
  border: none;
  padding: 16px 34px;
  font-size: 17px;
  font-weight: 500;
  border-radius: 50px;
  box-shadow: 0 6px 20px rgba(196,104,122,0.3);
  cursor: pointer;
}

/* Card */
.card {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9) translateY(40px);
  width:86%;
  background:var(--cream);
  border-radius:24px;
  padding:32px 24px 28px;
  text-align:center;
  opacity:0;
  visibility: hidden;
  box-shadow: 0 10px 30px rgba(44,26,29,0.25); /* lebih ringan */
  z-index: 200;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.card.show {
  opacity:1;
  visibility: visible;
  transform:translate(-50%,-50%) scale(1) translateY(0);
}
.card p {
  font-size:clamp(14px, 3.6vw, 15.5px);
  line-height:1.75;
  color:#6b3d44;
  text-align:left;
  white-space: pre-line;
  margin-bottom: 18px;
}

/* Foto - dioptimalkan */
.nata-photo {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 14px;
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.7s ease;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}
.nata-photo.show {
  opacity: 1;
  transform: translateY(0);
}

/* Hearts - dikurangi jumlah + lebih ringan */
.hearts {
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index: 150;
}
.heart {
  position:absolute;
  font-size:18px;
  opacity:0;
  animation: floatH 3s linear forwards;
  will-change: transform, opacity;
}
@keyframes floatH {
  to {
    opacity:0;
    transform: translateY(-140px) scale(1.2);
  }
}
</style>
</head>
<body>
<div class="phone">
  <div class="bg"></div>
  <div class="blob1"></div>
  <div class="blob2"></div>
  
  <div class="main-title">HELLO NATT!!<br>INI ADA PESAN UNTUK KAMU YA!</div>

  <div class="btn-container" id="btnContainer">
    <button class="btn" id="openBtn">Lihat Pesan Spesial</button>
  </div>

  <div class="card" id="card">
    <div class="card-lbl" style="color:#e8a0a8; font-size:11px; letter-spacing:2px;">dari Shofy</div>
    <h3 style="font-family:'Playfair Display',serif; font-size:24px; margin-bottom:10px; color:#2c1a1d;">Happy Birthday, Nataa! 🎂</h3>
    <div style="width:34px; height:1.5px; background:#e8a0a8; margin:0 auto 16px;"></div>
    <p id="text2"></p>
    <img src="nata.jpeg" alt="Nataa" class="nata-photo" id="nataPhoto">
  </div>

  <div class="hearts" id="hearts"></div>
</div>

<script>
const msg2 = `Happy birthday, Nataa!! 🥳 Yang ke... ke.. berapa ya? 24 kan? 🤣 wkwkwkwk
Yahh pokoknya semoga tahun ini penuh kebahagiaan, kemudahan, dan semua hal yang kamu harapkan bisa tercapai yaa ✨
Semangat terus buat kerjaannya! Aku tahu kadang capek dan berat, tapi aku yakin kamu pasti bisa lewatin semuanya
Ohh yaa lupa istirahat, jaga kesehatan`;

function typeWriter(el, text, speed = 45, callback) {
  el.innerHTML = "";
  let i = 0;
  function tick() {
    if (i < text.length) {
      el.innerHTML += text[i] === '\n' ? '<br>' : text[i];
      i++;
      setTimeout(tick, speed);
    } else if (callback) callback();
  }
  tick();
}

function spawnHearts() {
  const c = document.getElementById("hearts");
  const em = ["❤️","🎉","✨","💖","🌸"];
  for (let i = 0; i < 8; i++) {   // dikurangi dari 15 jadi 8
    setTimeout(() => {
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = em[Math.floor(Math.random() * em.length)];
      h.style.left = (15 + Math.random() * 70) + "%";
      h.style.bottom = "20%";
      h.style.animationDelay = (Math.random() * 0.8) + "s";
      c.appendChild(h);
      setTimeout(() => h.remove(), 3500);
    }, i * 120);
  }
}

document.getElementById("openBtn").addEventListener("click", () => {
  const btn = document.getElementById("btnContainer");
  const card = document.getElementById("card");

  btn.style.opacity = "0";
  btn.style.transform = "translate(-50%, -50%) scale(0.85)";

  setTimeout(() => {
    btn.style.display = "none";
    card.classList.add("show");

    setTimeout(() => {
      spawnHearts();
      typeWriter(document.getElementById("text2"), msg2, 45, () => {
        document.getElementById("nataPhoto").classList.add("show");
      });
    }, 300);
  }, 500);
});
</script>
</body>
</html>
