<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kartu buat Nisa</title>
    <meta name="description" content="Kartu ucapan singkat bertema pink untuk Nisa." />
    <style>
      :root {
        --bg0: #2a0a22;
        --bg1: #4a0f34;
        --card0: rgba(255, 255, 255, 0.1);
        --card1: rgba(255, 255, 255, 0.06);
        --stroke: rgba(255, 255, 255, 0.18);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.75);
        --accent: #ff7ac8;
        --accent2: #ffb4dd;
        --accent3: #ffd1ea;
        --shadow: 0 22px 60px rgba(40, 0, 26, 0.55);
        --btnShadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(
            900px 550px at 20% 15%,
            rgba(255, 122, 200, 0.25),
            transparent 55%
          ),
          radial-gradient(
            700px 450px at 85% 30%,
            rgba(255, 180, 221, 0.18),
            transparent 60%
          ),
          radial-gradient(
            900px 650px at 55% 95%,
            rgba(255, 209, 234, 0.18),
            transparent 60%
          ),
          linear-gradient(145deg, var(--bg0), var(--bg1));
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .wrap {
        width: min(720px, 100%);
      }

      .stage {
        display: grid;
        gap: 16px;
      }

      .gate {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.05)
        );
        box-shadow: var(--shadow);
        padding: 26px;
        backdrop-filter: blur(10px);
      }

      .gate::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: radial-gradient(
            440px 280px at 18% 20%,
            rgba(255, 122, 200, 0.35),
            transparent 60%
          ),
          radial-gradient(
            420px 260px at 90% 30%,
            rgba(255, 180, 221, 0.26),
            transparent 55%
          );
        opacity: 0.95;
        pointer-events: none;
      }

      .gate > * {
        position: relative;
        z-index: 1;
      }

      .gateTitle {
        margin: 0;
        font-size: clamp(22px, 4vw, 34px);
        line-height: 1.08;
        letter-spacing: -0.4px;
      }

      .gateSub {
        margin: 10px 0 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 15px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .btn {
        appearance: none;
        border: 0;
        cursor: pointer;
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #2a081f;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        box-shadow: var(--btnShadow);
        transform: translateY(0);
        transition: transform 160ms ease, filter 160ms ease;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .btn:focus-visible {
        outline: 3px solid rgba(255, 180, 221, 0.45);
        outline-offset: 3px;
      }

      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.02) saturate(1.05);
      }

      .btn:active {
        transform: translateY(1px) scale(0.99);
      }

      .btnIcon {
        width: 18px;
        height: 18px;
        display: inline-grid;
        place-items: center;
      }

      .hint {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.65);
      }

      .card {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        background: linear-gradient(180deg, var(--card0), var(--card1));
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        padding: 28px;
        backdrop-filter: blur(10px);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: radial-gradient(
            420px 260px at 20% 10%,
            rgba(255, 122, 200, 0.35),
            transparent 60%
          ),
          radial-gradient(
            380px 220px at 92% 38%,
            rgba(255, 180, 221, 0.26),
            transparent 55%
          );
        opacity: 0.9;
        pointer-events: none;
        filter: blur(0.2px);
      }

      .card > * {
        position: relative;
        z-index: 1;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        box-shadow: 0 0 0 4px rgba(139, 211, 255, 0.12);
      }

      .chip span {
        font-size: 13px;
        letter-spacing: 0.2px;
        color: var(--muted);
        white-space: nowrap;
      }

      .mini {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4.8vw, 44px);
        line-height: 1.06;
        letter-spacing: -0.6px;
      }

      h1 .name {
        background: linear-gradient(135deg, var(--accent3), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .sub {
        margin: 10px 0 0 0;
        font-size: 15px;
        line-height: 1.6;
        color: var(--muted);
      }

      .note {
        margin-top: 18px;
        padding: 16px 16px 14px;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .note p {
        margin: 0;
        font-size: 16px;
        line-height: 1.65;
        color: rgba(255, 255, 255, 0.9);
      }

      .note strong {
        color: #ffffff;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
      }

      .tag svg {
        width: 16px;
        height: 16px;
        opacity: 0.9;
      }

      .sign {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.65);
      }

      .sign .from {
        color: rgba(255, 255, 255, 0.85);
      }

      @media (prefers-reduced-motion: no-preference) {
        .btn {
          animation: pop 900ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
        }
        @keyframes pop {
          0% {
            transform: translateY(8px) scale(0.98);
            filter: saturate(0.95);
            opacity: 0;
          }
          100% {
            transform: translateY(0) scale(1);
            filter: saturate(1);
            opacity: 1;
          }
        }

        .reveal {
          transform-origin: top center;
          animation: reveal 720ms cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes reveal {
          0% {
            opacity: 0;
            transform: translateY(10px) scale(0.985);
            filter: blur(6px);
          }
          100% {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
          }
        }

        .sparkle {
          position: absolute;
          inset: 0;
          pointer-events: none;
          opacity: 0;
          background: radial-gradient(
              2px 2px at 18% 30%,
              rgba(255, 255, 255, 0.8),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 38% 22%,
              rgba(255, 255, 255, 0.65),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 62% 28%,
              rgba(255, 255, 255, 0.7),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 78% 20%,
              rgba(255, 255, 255, 0.6),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 85% 36%,
              rgba(255, 255, 255, 0.7),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 26% 62%,
              rgba(255, 255, 255, 0.6),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 52% 70%,
              rgba(255, 255, 255, 0.65),
              transparent 55%
            ),
            radial-gradient(
              2px 2px at 76% 66%,
              rgba(255, 255, 255, 0.7),
              transparent 55%
            );
          mix-blend-mode: screen;
        }

        .sparkle.on {
          animation: sparkle 900ms ease-out both;
        }
        @keyframes sparkle {
          0% {
            opacity: 0;
            transform: scale(0.98);
          }
          30% {
            opacity: 0.65;
          }
          100% {
            opacity: 0;
            transform: scale(1);
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="stage">
        <section class="gate" aria-label="Pembuka kartu">
          <div class="sparkle" id="sparkle" aria-hidden="true"></div>
          <h2 class="gateTitle">Pssst… ada pesan kecil buat kamu</h2>
          <p class="gateSub">
            Buat <strong>Nisa</strong> — dari kenalan baru kamu, <strong>Shofy</strong>.
          </p>
          <div class="actions">
            <button class="btn" id="openCard" type="button" aria-controls="card" aria-expanded="false">
              <span class="btnIcon" aria-hidden="true">📬</span>
              <span>Buka kartunya</span>
            </button>
            <div class="hint">tenang aja, isinya santai kok 🙂</div>
          </div>
        </section>

        <section class="card" id="card" aria-label="Kartu ucapan" hidden>
          <div class="top">
            <div class="chip" aria-label="Kenalan">
              <span class="dot" aria-hidden="true"></span>
              <span>Hai Nisaaa</span>
            </div>
            <div class="mini">kenalan dari bumpy</div>
          </div>

          <h1>
            Seneng akhirnya kenal
            <span class="name">kamu</span>.
          </h1>

          <div class="note">
            <p>
              Semangat kerjanya yaa! Kamu pasti bisa lewatin hari-hari sibuk itu,
              Jangan lupa makan & istirahat juga ya 🙂
            </p>
          </div>

          <div class="footer">
            <div class="sign">
              dari <span class="from">Shofy</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const btn = document.getElementById("openCard");
      const card = document.getElementById("card");
      const sparkle = document.getElementById("sparkle");

      function openCard() {
        if (!card.hidden) return;
        btn.setAttribute("aria-expanded", "true");

        sparkle.classList.remove("on");
        void sparkle.offsetWidth;
        sparkle.classList.add("on");

        card.hidden = false;
        card.classList.remove("reveal");
        void card.offsetWidth;
        card.classList.add("reveal");

        setTimeout(() => card.scrollIntoView({ behavior: "smooth", block: "center" }), 250);
      }

      btn.addEventListener("click", openCard);
      btn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") openCard();
      });
    </script>
  </body>
</html>
